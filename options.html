<!DOCTYPE html>
<html>
<head>
  <title>Downloader Options</title>
  <style>
    body { font-family: Arial, sans-serif; padding: 20px; width: 300px; }
    label { font-weight: bold; display: block; margin-bottom: 5px; }
    input { width: 100%; padding: 8px; margin-bottom: 15px; box-sizing: border-box; }
    button { padding: 8px 12px; background: #1d9bf0; color: white; border: none; border-radius: 4px; cursor: pointer; }
    button:hover { background: #1a8cd8; }
    .note { font-size: 12px; color: #666; margin-bottom: 15px; }
    #status { color: #00ba7c; margin-left: 10px; font-weight: bold; }
  </style>
</head>
<body>
  <label for="folderName">Save Folder Name:</label>
  <div class="note">This folder will be created inside your browser's default Downloads directory. Leave blank to save directly to Downloads.</div>
  
  <input type="text" id="folderName" placeholder="e.g., twitter_download">
  
  <button id="saveBtn">Save</button>
  <span id="status"></span>

  <script src="options.js"></script>
</body>
</html>
